<!DOCTYPE html>
<html>
<head>
    <title>StudentSiesta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">                              
    <!--<link rel="stylesheet" href="/frontend/css/sleep_tracker.css">-->
    <link rel="stylesheet" href="../css/sleep_tracker.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">                                     
</head>
<body>
    <nav>
        <div class=title>
            <h1>StudentSiesta</h1>
        </div>
        <a href="homepage.html"><button class="tab active">Home</button></a>
        <a href="log_sleep.html"><button class="tab" id="logTab">Log Sleep</button></a>
        <a href="schedule.html"><button class="tab" id="scheduleTab">Schedule</button></a>
        <a href="insights.html"><button class="tab" id="insightsTab">Insights</button></a>
        <a href="login.html"><button class="tab">Login</button></a>
        <button class="tab" id="logoutBtn">Logout</button>
    </nav>
    
    <section class="upcoming-events">
        <h4 style="text-align: center; font-size: 22px;">Upcoming High-Stakes Events 🚨</h4>
        <div id="upcomingEvents"></div>
    </section>

    <section class="cards">
        <div class="card">
            <h4>7-Day Sleep Debt</h4>
            <p class="value" id="sleepDebtValue">-- hrs</p>
        </div>

       <div class="card goal-progress-card">
          <h4>Your Progress vs. Goal</h4>

           <div class="goal-progress-box">
             <p class="goal-label">7-Day Avg Sleep</p>
             <p class="goal-value" id="goalAvgValue">hrs</p>

            <div class="goal-bar">
            <div class="goal-fill" id="goalFill"></div>
         </div>

          <p class="goal-percent" id="goalPercent">--% of goal</p>
          </div>
        </div>

        <div class="card">
            <h4>Chronotype</h4>
            <p class="chronotype-title" id="chronotypeValue">--</p>
            <button id="learnMoreBtn" onclick="toggleChronoBanner()">Learn more</button>
        </div>
    </section>

    <div class="chrono-banner">
        <p class="chronotype-description" id="chronotypeDesc"></p>
    </div>

    <section class="charts">
        <h4>Weekly Sleep Pattern</h4>
        <div class="weekHeader">
            <button id="prevWeek">←</button>
            <h3 id="weekTitle"></h3>
            <button id="nextWeek">→</button>
        </div>
        <canvas id="sleepChart"></canvas>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/sleep_tracker.js"></script>
    <script src="../js/logout.js"></script>
    

    <!--<script src="/frontend/js/sleep_tracker.js"></script>-->
</body>
</html>
