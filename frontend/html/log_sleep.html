<body>
    <nav>
        <div class="title">
            <h1>StudentSiesta</h1>
        </div>
        <a href="homepage.html"><button class="tab">Home</button></a>
        <a href="log_sleep.html"><button class="tab active" id="logTab">Log Sleep</button></a>

        <a href="insights.html"><button class="tab" id="insightsTab">Insights</button></a>

         <button class="tab" id="logoutBtn">Logout</button>
    </nav>

    <h3>Track your sleep to identify patterns and improve your wellness</h3>

    <div id="sleepDataForm" class="sleep-logger">
        <h3>Log Your Sleep</h3>

        <form id="sleepData">
            <h3>What date are you logging for?</h3>
            <input type="date" id="sleepDate" required>

            <h3>When did you go to bed?</h3>
            <input type="time" id="bedtime" required>
            
            <h3>When did you wake up?</h3>
            <input type="time" id="wakeTime" required>

            <h3>How would you rate your sleep quality?</h3>
            <input type="number" id="quality" min="1" max="5" required>
            
            <button type="submit" id="submit-log">Log Sleep</button>
    
        </form>

        <p id="statusMessage"></p>
    </div>
   <!--  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>-->
    <script src="../js/sleep_tracker.js"></script>
    <script src="../js/logout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</body>
</html>
