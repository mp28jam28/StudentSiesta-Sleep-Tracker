<!DOCTYPE html>
<html>
<head>
    <title>StudentSiesta - Login</title>
    <link rel="stylesheet" href="../css/sleep_tracker.css">
    <link rel="stylesheet" href="../css/login.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <nav>
        <div class="title">
            <h1>StudentSiesta</h1>
        </div>
        <a href="homepage.html"><button class="tab">Home</button></a>
        <a href="log_sleep.html"><button class="tab">Log Sleep</button></a>
        <a href="schedule.html"><button class="tab">Schedule</button></a>
        <a href="insights.html"><button class="tab">Insights</button></a>
        <a href="login.html"><button class="tab active">Login</button></a>
        <button class="tab" id="logoutBtn">Logout</button>
    </nav>

    <div class="login-container">
        <div class="login-wrapper">
            <form id="loginForm">
                <div class="sign-in">
                    Sign in
                </div>

                <div class="container">
                    <label for="uname"><b>Username</b></label>
                    <input type="text" id="uname" name="uname" placeholder="Enter Username" required>

                    <label for="psw"><b>Password</b></label>
                    <input type="password" id="psw" name="psw" placeholder="Enter Password" required>

                    <button type="submit">Login</button>

                    <div>
                        New to StudentSiesta?
                        <a href="registration.html">Create an Account</a>
                    </div>
                    <label>
                        Remember me
                        <input type="checkbox" checked="checked" name="remember">
                    </label>
                    
                </div>

                <div class="container bottom-container">
                    <button type="button" class="cancelbtn">Cancel</button>
                    <span class="psw">Forgot <a href="#">password?</a></span>
                </div>
            </form>
        </div>

        <div class="google-login">

            <p style="color:white;">OR</p>

            <div id="g_id_onload"
                data-client_id="1036286878464-5v0om0r4rcgov918sn18q5l61dd1nka1.apps.googleusercontent.com"  
                data-context="signin"
                data-ux_mode="popup"
                data-callback="handleCredentialResponse">
            </div>

            <div class="g_id_signin"
                data-type="standard"
                data-size="large"
                data-theme="outline"
                data-text="signin_with"
                data-shape="rectangular">
            </div>
        </div>
    </div>

    <script>
    async function handleCredentialResponse(response) {

        try {

            const res = await fetch("http://127.0.0.1:5000/google-login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                credentials: "include",
                body: JSON.stringify({
                    credential: response.credential
                })
            });

            const result = await res.json();

            if (!res.ok) {
                throw new Error(result.error || "Google login failed");
            }

            alert("Logged in as " + result.email);

            // redirect after login
            window.location.href = "homepage.html";

        } catch (err) {

            console.error(err);
            alert("Login error: " + err.message);

        }

    }
    </script>
    <script>
    document.getElementById("loginForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const username = document.getElementById("uname").value;
    const password = document.getElementById("psw").value;

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "include",
            body: JSON.stringify({
                username: username,
                password: password
            })
        });

        const result = await res.json();

        if (!res.ok) {
            throw new Error(result.error || "Login failed");
        }

        alert("Logged in as " + result.username);
        window.location.href = "homepage.html";

    } catch (err) {
        console.error(err);
        alert("Login error: " + err.message);
    }
   });
   </script>
    <script src="/js/logout.js"></script>
</body>
</html>
