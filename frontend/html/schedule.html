<!DOCTYPE html>
<html>
<head>
    <title>StudentSiesta</title>
    <link rel="stylesheet" href="../css/sleep_tracker.css">
    <link rel="stylesheet" href="../css/schedule.css">
</head>
<body>
    <nav>
        <div class=title>
            <h1>StudentSiesta</h1>
        </div>
        <a href="homepage.html"><button class="tab">Home</button></a>
        <a href="log_sleep.html"><button class="tab" id="logTab">Log Sleep</button></a>
        <a href="schedule.html"><button class="tab active" id="scheduleTab">Schedule</button></a>
        <a href="insights.html"><button class="tab" id="insightsTab">Insights</button></a>
        <a href="login.html"><button class="tab">Login</button></a>
        <button class="tab" id="logoutBtn">Logout</button>
    </nav>

    <div class="schedule-container">
        <div class="schedule-tabs">
            <button class="tab active" data-target="calendarTab">View Calendar</button>
            <button class="tab" data-target="classesTab">Add Classes</button>
            <button class="tab" data-target="examsTab">Add Exams</button>
        </div>

        <div class="tab-content active" id="calendarTab">
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prevMonth">←</button>
                    <h3 id="monthYear"></h3>
                    <button id="nextMonth">→</button>
                </div>
                <table class="calendar-table">
                    <thead>
                        <tr>
                            <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                        </tr>
                    </thead>
                    <tbody id="calendar-body">
                    </tbody>
                </table>
            </div>
        </div>


        <div class="tab-content" id="classesTab">
            <div class="class-container">
                <div class="class-header">
                    <h3>Class Schedule</h3>
                </div>
                    <div class="add-classes-description">Add your weekly classes to track nights before early classes</div>
                    <form id="addClasses" class="addClasses">
                        <div class="class-fields-row">
                            <div class="class-field">
                                <label>Class Name</label>
                                <input type="text" placeholder="e.g., Calculus II" required>
                            </div>
                            <div class="class-field">
                                <label>Day(s)</label>
                                <div class="day-toggles">
                                    <button type="button" class="day-btn" data-day="Mon">M</button>
                                    <button type="button" class="day-btn" data-day="Tue">T</button>
                                    <button type="button" class="day-btn" data-day="Wed">W</button>
                                    <button type="button" class="day-btn" data-day="Thu">Th</button>
                                    <button type="button" class="day-btn" data-day="Fri">F</button>
                                    <button type="button" class="day-btn" data-day="Sat">Sa</button>
                                    <button type="button" class="day-btn" data-day="Sun">Su</button>
                                </div>
                            </div>
                            <div class="class-field">
                                <label>Time</label>
                                <input type="time" required>
                            </div>
                        </div>
                        <button type="submit" class="add-class-btn">+ Add Class</button>
                        <div id="classAddedMsg" class="class-added-msg" style="display:none;"></div>
                    </form>
                    <div id="classList" class="class-list"></div>
                </div>
            </div>
        </div>

        <div class="tab-content" id="examsTab">
            <div class="exams-container">
                <div class="exams-header">
                    <h3>Upcoming Exams</h3>
                </div>
                    <div class="add-exams-description">Log your exams to track sleep pattern changes during high-stress periods</div>
                    <form id="addExams" class="addExams">
                        <div class="exam-fields-row">
                            <div class="exam-field">
                                <label>Exam Name</label>
                                <input type="text" name="examName" placeholder="e.g., Calculus Midterm" required>
                            </div>
                            <div class="exam-field">
                                <label>Date</label>
                                <input type="date" name="examDate" required>
                            </div>
                        </div>
                        <div class="exam-fields-row">
                            <div class="exam-field">
                                <input type="radio" id="midterm" name="examType" value="Midterm">
                                <label for="midterm" class="type-btn">Midterm</label>
                            </div>
                            <div class="exam-field">
                                <input type="radio" id="final" name="examType" value="Final">
                                <label for="final" class="type-btn">Final</label>
                            </div>
                        </div>
                        <button type="submit" class="add-exam-btn">+ Add Exam</button>
                        <div id="examAddedMsg" class="exam-added-msg" style="display:none;"></div>
                    </form>
                    <div id="examList" class="exam-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/schedule.js"></script>
    <script src="/js/logout.js"></script>
</body>
</html>
